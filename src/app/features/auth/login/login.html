<div class="login-container">
    <div class="login-card">
        <h2>Login</h2>
        <p>Please enter email and password to login.</p>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="loginCredentials.email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="loginCredentials.password" required>
            </div>

            @if (errorMessage) 
            {
                <div class="error-banner">
                    {{ errorMessage }}
                </div>
            }

            <button type="submit" [disabled]="loginForm.invalid">Login</button>
        </form>
    </div>
</div>
