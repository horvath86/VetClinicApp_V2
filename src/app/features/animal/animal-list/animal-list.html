<div class="animal-dashboard">
    <header class="dashboard-header">
        <h1>Patient Registry</h1>
    </header>

    <div class="filter-bar">
        <input type="text" [(ngModel)]="searchTerm" (input)="loadAnimals()" placeholder="Search by code or name...">

        <select [(ngModel)] = "selectedSpecies" (change)="loadAnimals()">
            <option [ngValue]="null">All Species</option>
            @for (species of speciesOptions; track species)
            {
                <option [value]="species">{{species}}</option>
            }
        </select>
    </div>

    @if(errorMessage)
    {
        <div class="error-banner">
            <p>{{errorMessage}}</p>
        </div>
    }

    <div class="grid-container">
        @for (animal of animals; track animal.id)
        {
            <div class="animal-card">
                <h3>{{animal.name}}</h3>
                <div class="card-details">
                    <p><strong>Species: </strong>{{animal.species}}</p>
                    <p><strong>Owner ID: </strong>{{animal.ownerId}}</p>
                    <span class="status-badge active">Active profile</span>
                </div>
            </div>
        }@empty{
            @if(!errorMessage){
                <div class="no-records">
                    <p>No animal patient matches your search settings.</p>
                </div>
            }
        }

    </div>



</div>
