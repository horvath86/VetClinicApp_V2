<nav class="navbar">
   
    <div class="nav-brand">
         <img src="/logo.png" alt="VetClinic Logo" class="logo-img">
        <h2>{{translate.t.appName}}</h2>
    </div>

    <div class="nav-links">
        <a routerLink="/animals" routerLinkActive="active-tab">{{translate.t.patients}}</a>
        <a routerLink="/users" routerLinkActive="active-tab">{{translate.t.users}}</a>

        <div class="nav-dropdown-item">
            <button class="dropdown-trigger-btn">
                {{ translate.t.medicalCatalogue }}
                <span class="dropdown-arrow">▼</span>
            </button>
             <div class="dropdown-menu-panel">
                <a routerLink="/medications" routerLinkActive="active-tab">{{translate.t.medications}}</a>
                <a routerLink="/diagnoses" routerLinkActive="active-tab">{{translate.t.diagnoses}}</a>
                <a routerLink="/procedures" routerLinkActive="active-tab">{{translate.t.procedures}}</a>
             </div>
        </div>

        
    </div>

    <div class="nav-actions">
        <button class="lang-btn" (click)="translate.toggleLanguage()">{{translate.currentLang === 'en'? 'SR' : 'EN'}}</button>
